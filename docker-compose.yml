version: "3.9"

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: somms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sommsDB
    restart: unless-stopped

  # Backend API
  backend:
    build: ./backend
    container_name: somms-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/sommsDB
      JWT_SECRET: dev_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      SLA_LOW: 72
      SLA_MEDIUM: 48
      SLA_HIGH: 24
      SLA_EMERGENCY: 4
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npx nodemon server.js
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: somms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
